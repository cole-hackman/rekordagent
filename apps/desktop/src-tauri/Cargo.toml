[package]
name = "decks-desktop"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lib]
name = "decks_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "decks-desktop"
path = "src/main.rs"

[dependencies]
tauri = { version = "2", features = [] }
tauri-build = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
decks-core = { path = "../../crates/decks-core" }

[build-dependencies]
tauri-build = { version = "2", features = [] }
